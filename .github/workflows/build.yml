name: Build

permissions:
  contents: write
  packages: write

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  linux-build:
    runs-on: ubuntu-latest

    steps:
      - name: Install apt deps (jq/zip + dev-libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zip jq \
            libpipewire-0.3-dev \
            libclang-dev \
            libasound2-dev

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.94.1

      - name: Extract all binary names
        id: cargo-meta
        run: |
          set -euo pipefail
          BIN_NAMES=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[0].targets[] | select(.kind[] | contains("bin")) | .name')
          echo "bin_names<<EOF" >> $GITHUB_OUTPUT
          echo "$BIN_NAMES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build all release binaries
        run: cargo build --release --locked

      - name: Package all binaries into one archive
        shell: bash
        run: |
          set -euo pipefail
          COMMIT_SHA="${{ github.sha }}"
          ARCHIVE_NAME="pwsp-${COMMIT_SHA}-linux-x64.zip"
          echo "Creating archive: $ARCHIVE_NAME"

          FILES=()
          while IFS= read -r BIN; do
            [ -z "$BIN" ] && continue
            FILES+=("target/release/$BIN")
          done <<< "${{ steps.cargo-meta.outputs.bin_names }}"

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "Error: no binaries were discovered via cargo metadata." >&2
            exit 1
          fi

          for f in "${FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Error: expected binary not found: $f" >&2
              exit 1
            fi
            echo "Will add: $f"
          done

          zip -j "$ARCHIVE_NAME" "${FILES[@]}"

      - name: Upload archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive
          path: pwsp-*.zip
          retention-days: 7

      - name: Install cargo-deb and create .deb
        shell: bash
        run: |
          set -euo pipefail
          cargo install --locked cargo-deb
          export PATH="$HOME/.cargo/bin:$PATH"

          cargo-deb

      - name: Upload .deb(s) as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: target/debian/*.deb
          retention-days: 7

  flatpak-build:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-25.08
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ru.arabianq.pwsp.flatpak
          manifest-path: packages/flatpak/ru.arabianq.pwsp.yaml
          cache: true
          branch: master
          build-bundle: true
